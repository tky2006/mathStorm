<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathStorm: Base Defense</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ─── RESET & VARS ─── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg-deep: #0a0a1a;
        --accent1: #7c3aed;
        --accent2: #a855f7;
        --accent3: #06b6d4;
        --danger: #ef4444;
        --text-main: #e2e8f0;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
      }
      body {
        background: var(--bg-deep);
        color: var(--text-main);
        font-family: "Inter", sans-serif;
        overflow: hidden;
        user-select: none;
        width: 100vw;
        height: 100vh;
      }

      /* ─── CANVAS ─── */
      #gameCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* ─── SCREENS ─── */
      .screen {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s;
        pointer-events: none;
        opacity: 0;
      }
      .screen.active {
        opacity: 1;
        pointer-events: auto;
      }

      .card {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(15px);
        border-radius: 16px;
        padding: 2.5rem;
        text-align: center;
        max-width: 600px;
      }

      h1,
      h2 {
        font-family: "Orbitron", sans-serif;
        text-transform: uppercase;
      }
      h1 {
        font-size: 3.5rem;
        margin-bottom: 0.5rem;
        color: var(--accent3);
      }
      h2 {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: var(--accent2);
      }

      .btn {
        background: linear-gradient(135deg, var(--accent1), var(--accent2));
        color: #fff;
        border: none;
        padding: 0.8rem 2rem;
        border-radius: 50px;
        font-family: "Orbitron", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s;
        margin: 0.5rem;
      }
      .btn:hover {
        transform: translateY(-3px);
      }

      /* ─── HUD ─── */
      #hud {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        padding: 1rem 2rem;
        pointer-events: none;
      }
      .hud-box {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        padding: 0.5rem 1rem;
        border-radius: 8px;
        backdrop-filter: blur(5px);
        font-family: "Orbitron", sans-serif;
        font-size: 1.2rem;
      }
      .target-display {
        font-size: 2rem;
        color: var(--accent3);
        font-weight: 900;
        text-shadow: 0 0 10px rgba(6, 182, 212, 0.8);
      }
      .ammo-display {
        position: absolute;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        display: flex;
        gap: 1rem;
        pointer-events: auto;
      }
      .ammo-slot {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 2px solid var(--accent1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: bold;
        background: rgba(0, 0, 0, 0.5);
        cursor: pointer;
        transition: 0.2s;
      }
      .ammo-slot.active {
        background: var(--accent1);
        box-shadow: 0 0 15px var(--accent2);
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div id="hud" style="display: none">
      <div class="hud-box">Round: <span id="ui-round">1</span>/10</div>
      <div class="hud-box">Score: <span id="ui-score">0</span></div>
      <div class="hud-box target-display">
        Target: <span id="ui-target">10</span>
      </div>
      <div class="hud-box" style="color: var(--danger)">
        Lives: <span id="ui-lives">3</span>
      </div>
    </div>

    <div class="ammo-display" id="ammoPanel" style="display: none">
      <!-- Populated by JS -->
    </div>

    <!-- START SCREEN -->
    <div class="screen active" id="startScreen">
      <div class="card">
        <h1>MathStorm</h1>
        <p style="margin-bottom: 2rem; color: var(--text-dim)">
          Base Defense Edition
        </p>
        <p style="margin-bottom: 1rem">
          Protect the core! Shoot numbered ammo at incoming asteroids.<br />If
          <strong>Ammo + Asteroid = Target</strong>, the asteroid is destroyed!
        </p>
        <button class="btn" onclick="startGame()">Start Game</button>
      </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="screen" id="endScreen">
      <div class="card">
        <h2 id="endTitle">Game Over</h2>
        <p style="font-size: 1.5rem; margin-bottom: 2rem">
          Final Score: <span id="finalScore">0</span>
        </p>
        <button class="btn" onclick="showStartScreen()">Main Menu</button>
      </div>
    </div>

    <script>
      /* ─── AUDIO ENGINE (Procedural Web Audio API) ─── */
      let spawnTimer = 0;
      let audioCtx;
      const initAudio = () => {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      };
      const playTone = (freq, type, dur, vol) => {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(
          0.01,
          audioCtx.currentTime + dur,
        );
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
      };
      const sfx = {
        shoot: () => {
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = "square";
          osc.frequency.setValueAtTime(880, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(
            110,
            audioCtx.currentTime + 0.15,
          );
          gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(
            0.01,
            audioCtx.currentTime + 0.15,
          );
          osc.start();
          osc.stop(audioCtx.currentTime + 0.15);
        },
        hit: () => {
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(200, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(
            50,
            audioCtx.currentTime + 0.15,
          );
          gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(
            0.01,
            audioCtx.currentTime + 0.15,
          );
          osc.start();
          osc.stop(audioCtx.currentTime + 0.15);
        },
        destroy: () => {
          if (!audioCtx) return;
          const bufferSize = audioCtx.sampleRate * 0.4;
          const buffer = audioCtx.createBuffer(
            1,
            bufferSize,
            audioCtx.sampleRate,
          );
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
          const noise = audioCtx.createBufferSource();
          noise.buffer = buffer;
          const filter = audioCtx.createBiquadFilter();
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
          filter.frequency.exponentialRampToValueAtTime(
            100,
            audioCtx.currentTime + 0.4,
          );
          const gain = audioCtx.createGain();
          gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(
            0.01,
            audioCtx.currentTime + 0.4,
          );
          noise.connect(filter);
          filter.connect(gain);
          gain.connect(audioCtx.destination);
          noise.start();
        },
        damage: () => {
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(150, audioCtx.currentTime);
          osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.6);
          gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.6);
        },
        bgMusic: null,
      };

      // Simple looping drone for BG
      let bgGainNode;
      let isPlayingBG = false;
      function toggleBG() {
        if (!audioCtx) return;
        if (!isPlayingBG) {
          bgGainNode = audioCtx.createGain();
          bgGainNode.gain.value = 0.05;
          bgGainNode.connect(audioCtx.destination);
          const osc = audioCtx.createOscillator();
          osc.type = "triangle";
          osc.frequency.value = 110;
          osc.connect(bgGainNode);
          osc.start();
          isPlayingBG = true;
        }
      }

      /* ─── GAME STATE & CONFIG ─── */
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      let cw, ch, cx, cy;

      function resize() {
        cw = canvas.width = window.innerWidth;
        ch = canvas.height = window.innerHeight;
        cx = cw / 2;
        cy = ch / 2;
      }
      window.addEventListener("resize", resize);
      resize();

      let state = {
        active: false,
        score: 0,
        lives: 3,
        targetValue: 10,
        round: 1,
        time: 0,
        lastTime: 0,
      };

      // Entities
      const player = { x: 0, y: 0, radius: 30, angle: 0 };
      let projectiles = [];
      let enemies = [];
      let particles = [];
      let availableAmmo = [1, 2, 3, 4, 5];
      let activeAmmoIndex = 0;

      /* ─── INPUT HANDLING ─── */
      const mouse = { x: 0, y: 0 };
      window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      window.addEventListener("mousedown", (e) => {
        if (state.active && e.button === 0) {
          if (e.target.closest(".ammo-slot")) return; // handled by HTML click
          shoot();
        }
      });
      window.addEventListener("keydown", (e) => {
        if (e.key >= "1" && e.key <= "5") {
          selectAmmo(parseInt(e.key) - 1);
        }
      });

      /* ─── UI UPDATES ─── */
      function updateHUD() {
        document.getElementById("ui-round").innerText = state.round;
        document.getElementById("ui-score").innerText = state.score;
        document.getElementById("ui-target").innerText = state.targetValue;
        document.getElementById("ui-lives").innerText = state.lives;
      }

      function renderAmmoUI() {
        const panel = document.getElementById("ammoPanel");
        panel.innerHTML = "";
        availableAmmo.forEach((val, idx) => {
          const d = document.createElement("div");
          d.className = `ammo-slot ${idx === activeAmmoIndex ? "active" : ""}`;
          d.innerText = val;
          d.onclick = () => selectAmmo(idx);
          panel.appendChild(d);
        });
      }

      function selectAmmo(idx) {
        if (idx >= 0 && idx < availableAmmo.length) {
          activeAmmoIndex = idx;
          renderAmmoUI();
        }
      }

      function setTarget() {
        // Generate a random target based on round
        state.targetValue =
          Math.floor(Math.random() * (10 + state.round * 5)) + 5;
        // Generate ammo to guarantee possible matches
        availableAmmo = [];
        for (let i = 0; i < 4; i++) {
          let am = Math.floor(Math.random() * (state.targetValue - 1)) + 1;
          availableAmmo.push(am);
        }
        // Guarantee one exact fit for a random enemy value (mocked here, enemies spawn with remaining)
        availableAmmo.push(Math.floor(state.targetValue / 2));
        activeAmmoIndex = 0;
        updateHUD();
        renderAmmoUI();
      }

      /* ─── CORE MECHANICS ─── */
      function shoot() {
        initAudio();
        toggleBG();
        sfx.shoot();
        const val = availableAmmo[activeAmmoIndex];
        const speed = 12;
        const vx = Math.cos(player.angle) * speed;
        const vy = Math.sin(player.angle) * speed;
        projectiles.push({
          x: player.x + Math.cos(player.angle) * player.radius,
          y: player.y + Math.sin(player.angle) * player.radius,
          vx: vx,
          vy: vy,
          radius: 12,
          value: val,
          life: 100,
        });
      }

      function spawnEnemy() {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.max(cw, ch) * 0.7;
        const speed = 0.8 + state.round * 0.12 + Math.random() * 0.5;
        // Pick a value such that one of the ammo slots can hit the target
        const guaranteedAmmo =
          availableAmmo[Math.floor(Math.random() * availableAmmo.length)];
        const eVal = state.targetValue - guaranteedAmmo;

        enemies.push({
          x: cx + Math.cos(angle) * dist,
          y: cy + Math.sin(angle) * dist,
          vx: -Math.cos(angle) * speed,
          vy: -Math.sin(angle) * speed,
          radius: 25,
          value: eVal > 0 ? eVal : Math.abs(eVal) + 1,
          hp: 1,
        });
      }

      function createExplosion(x, y, color) {
        for (let i = 0; i < 15; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 5 + 2;
          particles.push({
            x: x,
            y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            radius: Math.random() * 4 + 2,
            color: color,
            life: 30,
            maxLife: 30,
          });
        }
      }

      /* ─── GAME LOOP ─── */
      function update(dt) {
        if (!state.active) return;
        state.time += dt;

        // Aim player
        player.x = cx;
        player.y = cy;
        player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

        // Spawner (balanced)
        spawnTimer += dt;

        const spawnDelay = Math.max(0.9, 2.2 - state.round * 0.12);
        const maxEnemies = 4 + state.round;

        if (spawnTimer >= spawnDelay && enemies.length < maxEnemies) {
          spawnTimer = 0;
          spawnEnemy();
        }

        // Projectiles
        for (let i = projectiles.length - 1; i >= 0; i--) {
          let p = projectiles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.life--;
          if (p.life <= 0 || p.x < 0 || p.x > cw || p.y < 0 || p.y > ch) {
            projectiles.splice(i, 1);
          }
        }

        // Enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
          let e = enemies[i];
          e.x += e.vx;
          e.y += e.vy;

          // Base collision
          const dBase = Math.hypot(e.x - player.x, e.y - player.y);
          if (dBase < player.radius + e.radius) {
            sfx.damage();
            createExplosion(e.x, e.y, "#ef4444");
            enemies.splice(i, 1);
            state.lives--;
            updateHUD();
            if (state.lives <= 0) gameOver();
            continue;
          }

          // Projectile collisions
          for (let j = projectiles.length - 1; j >= 0; j--) {
            let p = projectiles[j];
            const dist = Math.hypot(e.x - p.x, e.y - p.y);
            if (dist < e.radius + p.radius) {
              // HIT! Combine logic: ADDITION
              const combined = e.value + p.value;
              if (combined === state.targetValue) {
                // Success!
                sfx.destroy();
                createExplosion(e.x, e.y, "#10b981");
                enemies.splice(i, 1);
                projectiles.splice(j, 1);
                state.score += 100;
                // Every 500 points, advance round and change target
                if (state.score % 500 === 0) {
                  state.round++;
                  if (state.round > 10) {
                    gameOver(true); // Victory!
                  } else {
                    setTarget();
                  }
                }
                updateHUD();
                break; // enemy dead, move to next
              } else {
                // Wrong math! Absorbs value, changes enemy value, bounces projectile
                sfx.hit();
                createExplosion(p.x, p.y, "#f59e0b");
                e.value = combined; // Asteroid gets bigger/changes value!
                e.radius = Math.min(60, e.radius + 5);
                projectiles.splice(j, 1);
              }
            }
          }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          let pt = particles[i];
          pt.x += pt.vx;
          pt.y += pt.vy;
          pt.life--;
          if (pt.life <= 0) particles.splice(i, 1);
        }
      }

      function draw() {
        // Background trailing
        ctx.fillStyle = "rgba(10, 10, 26, 0.3)";
        ctx.fillRect(0, 0, cw, ch);

        if (!state.active) return;

        // Draw grid
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = 0; x < cw; x += 50) {
          ctx.moveTo(x, 0);
          ctx.lineTo(x, ch);
        }
        for (let y = 0; y < ch; y += 50) {
          ctx.moveTo(0, y);
          ctx.lineTo(cw, y);
        }
        ctx.stroke();

        // Draw Base
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);
        // Base circle
        ctx.fillStyle = "#1e1e3f";
        ctx.beginPath();
        ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#06b6d4";
        ctx.lineWidth = 3;
        ctx.stroke();
        // Cannon
        ctx.fillStyle = "#06b6d4";
        ctx.fillRect(player.radius - 10, -8, 25, 16);
        ctx.restore();

        // Draw Particles
        particles.forEach((pt) => {
          ctx.globalAlpha = pt.life / pt.maxLife;
          ctx.fillStyle = pt.color;
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, pt.radius, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Draw Projectiles
        projectiles.forEach((p) => {
          ctx.fillStyle = "#a855f7";
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#fff";
          ctx.font = "12px Orbitron";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(p.value, p.x, p.y);
        });

        // Draw Enemies
        enemies.forEach((e) => {
          ctx.fillStyle = "#3f1e1e";
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#ef4444";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = "#fff";
          ctx.font = "bold 18px Orbitron";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(e.value, e.x, e.y);
        });
      }

      function loop(timestamp) {
        const dt = (timestamp - state.lastTime) / 1000;
        state.lastTime = timestamp;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      /* ─── FLOW CONTROL ─── */
      function startGame() {
        document.getElementById("startScreen").classList.remove("active");
        document.getElementById("endScreen").classList.remove("active");
        document.getElementById("hud").style.display = "flex";
        document.getElementById("ammoPanel").style.display = "flex";

        state.active = true;
        state.score = 0;
        state.lives = 3;
        state.round = 1;
        projectiles = [];
        enemies = [];
        particles = [];

        spawnTimer = 0;

        setTarget();
        initAudio();
        toggleBG();
        state.lastTime = performance.now();
      }

      function gameOver(win = false) {
        state.active = false;
        document.getElementById("hud").style.display = "none";
        document.getElementById("ammoPanel").style.display = "none";
        document.getElementById("endScreen").classList.add("active");
        document.getElementById("endTitle").innerText = win
          ? "🎉 STORM COMPLETE!"
          : "💀 Game Over!";
        document.getElementById("finalScore").innerText = state.score;

        if (win && sfx.destroy) sfx.destroy(); // Optional victory sound cue
      }

      function showStartScreen() {
        document.getElementById("endScreen").classList.remove("active");
        document.getElementById("startScreen").classList.add("active");
      }

      requestAnimationFrame(loop);
    </script>
  </body>
</html>
